    <!-- TODO: Klistra in din kod från alert.html
    Låt användaren skriva in sin favoritmat med en input-tag
    När användaren klickar på knappen ska du välkomna användaren till hemsidan 
    + skriva ut dens favoritmat + "MUMS" -->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Uppgift 5</title>
  </head>
  <body>
    <input id="favoritmat" type="text" placeholder="Vad är din favoritmat?" />
    <button onclick="visaHälsning()">Klicka här!</button>

    <script>
      function visaHälsning() {
        var mat = document.getElementById("favoritmat").value;
        alert("Välkommen till hemsidan! Din favoritmat är " + mat + " MUMS");
      }
    </script>
  </body>
</html>
